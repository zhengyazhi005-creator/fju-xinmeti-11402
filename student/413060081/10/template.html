<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --bg-color: #f9fafb;
            --text-color: #1f2937;
            --secondary-text: #4b5563;
            --hashtag-bg: #eff6ff;
            --hashtag-text: #1d4ed8;
        }
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.8;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        article {
            max-width: 800px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h1 {
            font-size: 2rem;
            text-align: center;
            color: #111827;
            margin-bottom: 40px;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 20px;
        }
        section {
            margin-bottom: 60px;
        }
        h2 {
            font-size: 1.5rem;
            color: #111827;
            border-left: 5px solid var(--primary-color);
            padding-left: 15px;
            margin-bottom: 20px;
        }
        p {
            margin-bottom: 15px;
            color: var(--secondary-text);
            text-align: justify;
        }
        ol {
            background: #f3f4f6;
            padding: 20px 20px 20px 45px;
            border-radius: 8px;
            margin: 25px 0;
        }
        li {
            margin-bottom: 10px;
            font-weight: 500;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 25px;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 9999px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            border: none;
        }
        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }
        .hashtag-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .hastag {
            font-size: 0.85rem;
            background-color: var(--hashtag-bg);
            color: var(--hashtag-text);
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: 500;
        }
        @media (max-width: 600px) {
            article { padding: 20px; }
            h1 { font-size: 1.5rem; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
<article>
    <h1>{{ main_title }}</h1>
    {{ sections_html }}
</article>
</body>
</html>
